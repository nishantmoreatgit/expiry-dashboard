name: Update Live Expiry Dashboard

on:
  schedule:
    - cron: '0 11 * * 1-5' # सोमवार ते शुक्रवार दुपारी ४:३० वाजता (IST)
  workflow_dispatch: # मॅन्युअली रन करण्यासाठी बटण

jobs:
  build:
    runs-on: ubuntu-latest
    
    # गिटहबच्या नवीन सिस्टीमला जुने व्हर्जन चालवण्यासाठीची अधिकृत परवानगी (मास्टर की)
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas fyers-apiv3

    - name: Run Script
      run: python cloud_expiry.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
