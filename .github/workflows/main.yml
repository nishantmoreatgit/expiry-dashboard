name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 🎯 FIXED HERE: Explicitly added the required deployment environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add -A  
          git diff-index --quiet HEAD || git commit -m "📊 Updated Live Dashboard Matrix Data"
          git push origin main

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
