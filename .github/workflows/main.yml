name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 FIXED HERE: Added a secure stash/pop cycle to isolate background runtime log noise
      - name: Commit and Force Sync Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # 1. Stage and lock only the modified dashboard file
          git add index.html
          git commit -m "📊 Live Dashboard Sync: $(date)"
          
          # 2. Stash untracked runtime logs (like fyersRequests.log) out of the way
          git stash --include-untracked
          
          # 3. Pull from the server safely and push your live updates
          git pull --rebase origin main -X ours
          git push origin main
          
          # 4. Optional: Clean up workspace stash allocation
          git stash pop || true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
