name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          # १. गिटहब सिक्रेट्समधील FY_USER_ID मध्ये तुमचा App ID (e.g. RAE54K69M5-100) टाका:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          
          # २. गिटहब सिक्रेट्समधील FY_ACCESS_TOKEN मध्ये तुमचा रोजचा लाइव्ह टोकन टाका:
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py
