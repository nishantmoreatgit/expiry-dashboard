name: Update Live Expiry Dashboard

on:
  schedule:
    - cron: '0 11 * * 1-5' # सोमवार ते शुक्रवार दुपारी ४:३० वाजता (IST)
  workflow_dispatch: # मॅन्युअली रन करण्यासाठी बटण

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # व्हर्जन v3 वरून v4 केले (Node 24 सुसंगत)

    - name: Set up Python
      uses: actions/setup-python@v5 # व्हर्जन v4 वरून v5 केले (Node 24 सुसंगत)
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas fyers-apiv3

    - name: Run Script
      run: python cloud_expiry.py

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4 # व्हर्जन v3 वरून v4 केले
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
