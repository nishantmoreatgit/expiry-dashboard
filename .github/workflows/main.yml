name: Update Live Expiry Dashboard

on:
  schedule:
    # ⏱️ सोमवार ते शुक्रवार भारतीय वेळेनुसार सकाळी ८:३० ते दुपारी ३:३० दरम्यान दर ५ मिनिटांनी धावेल
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: # मॅन्युअली रन करण्यासाठी बटण

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas fyers-apiv3 requests

    - name: Run Script
      env:
        FY_ACCESS_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
      run: python cloud_expiry.py

    - name: Commit & Push index.html
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add docs/index.html
        git commit -m "Auto updated index.html dashboard" || echo "No changes to commit"
        git push
