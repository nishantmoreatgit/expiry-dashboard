name: Fetch Fyers Live Data

on:
  schedule:
    # 📊 Runs every 5 minutes during Indian market hours (Mon-Fri)
    - cron: '*/5 3-10 * * 1-5'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 GUARANTEED FIX: Explicitly prevents Git from throwing Exit Code 1 when changes are identical
      - name: Commit and Force Sync Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # Stage the production dashboard file
          git add index.html
          
          # Check changes explicitly using porcelain status strings
          if [ -n "$(git status --porcelain index.html)" ]; then
            echo "✅ New market movements detected. Updating dashboard tracking repository..."
            git commit -m "📊 Live Dashboard Sync: $(date)"
            git stash --include-untracked
            git pull --rebase origin main -X ours
            git push origin main
            git stash pop || true
          else
            # 🚀 Forces a clean shell exit code 0 status
            echo "ℹ️ Dashboard prices are already up to date. Skipping commit to prevent empty tree crashes."
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
