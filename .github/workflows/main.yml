name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      # 👈 गिटहब पेजेस पब्लिश करण्याची अधिकृत परवानगी
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 Updated Commit Step to force-capture index layout adjustments
      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add -A  # 👈 Captures all workspace shifts cleanly
          git diff-index --quiet HEAD || git commit -m "📊 Updated Live Dashboard Matrix Data"
          git push origin main

      # 🎯 पायरी २: थेट गिटहब सर्व्हरवर नवीन पेज डिप्लॉय करणे (बदलांसाठी १ सेकंद लागेल)
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
