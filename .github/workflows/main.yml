name: Update Live Expiry Dashboard

on:
  schedule:
    - cron: '0 11 * * 1-5' # सोमवार ते शुक्रवार दुपारी ४:३० वाजता (IST)
  workflow_dispatch: # मॅन्युअली रन करण्यासाठी बटण

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas fyers-apiv3 pyotp cryptography requests

    - name: Run Script
      # येथे आपण गिटहब लॉकरमधील सिक्रेट्स पायथन कोडला पास करत आहोत
      env:
        FY_SECRET_KEY: ${{ secrets.FY_SECRET_KEY }}
        FY_USER_ID: ${{ secrets.FY_USER_ID }}
        FY_PIN: ${{ secrets.FY_PIN }}
        FY_TOTP_KEY: ${{ secrets.FY_TOTP_KEY }}
      run: python cloud_expiry.py

    - name: Commit & Push index.html
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add docs/index.html
        git commit -m "Auto updated index.html dashboard" || echo "No changes to commit"
        git push
