name: Fetch Fyers Live Data

on:
  schedule:
    # सोमवार ते शुक्रवार, भारतीय वेळेनुसार सकाळी ८:४५ ते दुपारी ३:४५ दरम्यान दर ५ मिनिटांनी धावेल
    - cron: '*/5 3-10 * * 1-5'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 🎯 जॉब १: डेटा खेचणे, कॅल्क्युलेशन करणे आणि index.html सेव्ह करणे
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      - name: Commit and Force Sync Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          git add index.html
          if [ -n "$(git status --porcelain index.html)" ]; then
            git commit -m "📊 Live Dashboard Sync: $(date)"
            git stash --include-untracked
            git pull --rebase origin main -X ours
            git push origin main
            git stash pop || true
          else
            echo "ℹ️ डॅशबोर्ड आधीपासूनच अपडेटेड आहे."
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # फक्त मूळ डिरेक्टरीमधील नवीन फाईल्स पॅक करणे

  # 🎯 जॉब २: जॉब १ पूर्ण झाल्यावर स्वतंत्रपणे गिटहब पेजेसवर पब्लिश करणे (यामुळे प्रोग्रेस लूप सुटेल)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 👈 महत्त्वाचे: पहिला जॉब यशस्वी संपल्यावरच हा सुरू होईल
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
