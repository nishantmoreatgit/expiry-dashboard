name: Fetch Fyers Live Data

on:
  schedule:
    # 📊 सोमवार ते शुक्रवार, भारतीय वेळेनुसार सकाळी ८:४५ ते दुपारी ३:४५ दरम्यान दर ५ मिनिटांनी ऑटो-रन होईल
    - cron: '*/5 3-10 * * 1-5'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 १००% सुरक्षित आणि दुरुस्त केलेली कमिट स्टेप (यामुळे 'no changes to commit' चा एरर येणार नाही)
      - name: Commit and Force Sync Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # १. इंडेक्स फाईल गिटमध्ये स्टेज करणे
          git add index.html
          
          # २. फाईलमध्ये काही नवीन बदल झाला आहे का ते तपासणे
          if ! git diff-index --quiet HEAD; then
            git commit -m "📊 Live Dashboard Sync: $(date)"
            git stash --include-untracked
            git pull --rebase origin main -X ours
            git push origin main
            git stash pop || true
          else
            # ✅ फिक्स: डेटा सारखाच असेल तर कोड क्रॅश न करता सुरक्षितपणे पुढे जाईल
            echo "डॅशबोर्ड फाईलमध्ये कोणताही नवीन बदल आढळला नाही. डिप्लॉयमेंट सुरू ठेवत आहे."
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
