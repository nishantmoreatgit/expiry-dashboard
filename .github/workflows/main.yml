name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write      
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 FIXED HERE: Changed 'print' to 'echo' to fix the bash syntax error
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add index.html
          if ! git diff-index --quiet HEAD; then
            git commit -m "📊 Updated Live Dashboard Matrix Data"
            git pull --rebase origin main
            git push origin main
          else
            echo "No visual changes discovered in dashboard index files."
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
