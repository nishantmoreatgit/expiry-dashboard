name: Update Live Expiry Dashboard

on:
  schedule:
    - cron: '0 11 * * 1-5' # सोमवार ते शुक्रवार दुपारी ४:३० वाजता (IST)
  workflow_dispatch: # मॅन्युअली रन करण्यासाठी बटण

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    # गिटहबच्या नवीन सिस्टीमवर Node 24 फोर्स करण्याचा अधिकृत नियम
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas fyers-apiv3 pyotp

    - name: Run Script
      run: python cloud_expiry.py

    - name: Commit & Push index.html
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add docs/index.html
        git commit -m "Auto updated index.html dashboard" || echo "No changes to commit"
        git push
