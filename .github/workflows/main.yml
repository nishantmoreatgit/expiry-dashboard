name: Fetch Fyers Live Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # 👈 गिटहब डॅशबोर्ड फाईल रायटिंग परमिशन दिली

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas fyers-apiv3 requests

      - name: Run Script
        env:
          FY_APP_ID: ${{ secrets.FY_USER_ID }}
          FY_LIVE_TOKEN: ${{ secrets.FY_ACCESS_TOKEN }}
        run: python cloud_expiry.py

      # 🎯 नवीन जोडलेली पायरी: बदललेला डॅशबोर्ड डेटा गिटहबवर सेव्ह करणे
      - name: Commit and Push Dashboard Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "📊 डॅशबोर्ड लाइव्ह डेटा अपडेट केला: $(date)"
          git push origin main
